services:
  geth-init:
    image: ethereum/client-go:v1.17.1
    container_name: vault-lab-geth-init
    volumes:
      - ./deploy/geth/genesis.json:/genesis.json:ro
      - geth-data:/root/.ethereum
    entrypoint: sh
    command: ["-c", "[ -d /root/.ethereum/geth/chaindata ] || geth init /genesis.json"]
    restart: "no"

  geth:
    image: ethereum/client-go:v1.17.1
    container_name: vault-lab-geth
    depends_on:
      geth-init:
        condition: service_completed_successfully
    volumes:
      - ./deploy/geth/genesis.json:/genesis.json:ro
      - geth-data:/root/.ethereum
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303/tcp"
      - "30303:30303/udp"
    command:
      [
        "--datadir", "/root/.ethereum",
        "--dev",
        "--dev.period", "0",
        "--http",
        "--http.addr", "0.0.0.0",
        "--http.port", "8545",
        "--http.api", "admin,debug,eth,miner,net,personal,txpool,web3",
        "--http.vhosts", "*",
        "--http.corsdomain", "*",
        "--ws",
        "--ws.addr", "0.0.0.0",
        "--ws.port", "8546",
        "--ws.api", "admin,debug,eth,miner,net,personal,txpool,web3",
        "--ws.origins", "*",
        "--verbosity", "3"
      ]
    healthcheck:
      test: ["CMD", "geth", "attach", "--exec", "eth.blockNumber", "/root/.ethereum/geth.ipc"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  geth-data:
    name: vault-lab-geth-data