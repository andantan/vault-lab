services:
  geth-init:
    image: ethereum/client-go:v1.17.1
    container_name: vault-lab-geth-init
    volumes:
      - ./deploy/geth/genesis.json:/genesis.json:ro
      - geth-data:/root/.ethereum
    entrypoint: sh
    command: [
      "-c",
      "[ -d /root/.ethereum/geth/chaindata ] || geth init /genesis.json"
    ]
    restart: "no"

  geth:
    image: ethereum/client-go:v1.17.1
    container_name: vault-lab-geth
    depends_on:
      geth-init:
        condition: service_completed_successfully
    volumes:
      - ./deploy/geth/genesis.json:/genesis.json:ro
      - geth-data:/root/.ethereum
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303/tcp"
      - "30303:30303/udp"
    command:
      [
        "--datadir", "/root/.ethereum",
        "--dev",
        "--dev.period", "0",
        "--http",
        "--http.addr", "0.0.0.0",
        "--http.port", "8545",
        "--http.api", "admin,debug,eth,miner,net,personal,txpool,web3",
        "--http.vhosts", "*",
        "--http.corsdomain", "*",
        "--ws",
        "--ws.addr", "0.0.0.0",
        "--ws.port", "8546",
        "--ws.api", "admin,debug,eth,miner,net,personal,txpool,web3",
        "--ws.origins", "*",
        "--verbosity", "3"
      ]
    healthcheck:
      test: ["CMD", "geth", "attach", "--exec", "eth.blockNumber", "/root/.ethereum/geth.ipc"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  blockscout-db:
    image: postgres:16-alpine
    container_name: vault-lab-blockscout-db
    environment:
      POSTGRES_DB: blockscout
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout
    volumes:
      - blockscout-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  blockscout-redis:
    image: redis:7-alpine
    container_name: vault-lab-blockscout-redis
    restart: unless-stopped

  blockscout:
    image: blockscout/blockscout:latest
    container_name: vault-lab-blockscout
    depends_on:
      geth:
        condition: service_healthy
      blockscout-db:
        condition: service_healthy
      blockscout-redis:
        condition: service_started
    ports:
      - "4000:4000"
    command: [
      "sh",
      "-c",
      "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    ]
    environment:
      PORT: "4000"
      DATABASE_URL: postgresql://blockscout:blockscout@blockscout-db:5432/blockscout?ssl=false
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://geth:8545
      ETHEREUM_JSONRPC_TRACE_URL: http://geth:8545
      ETHEREUM_JSONRPC_WS_URL: ws://geth:8546
      CHAIN_ID: "20001209"
      NETWORK: Vault Lab Local
      SUBNETWORK: Local Geth
      COIN: ETH
      SECRET_KEY_BASE: vault_lab_local_secret_key_base_for_development_only_change_me
      DISABLE_EXCHANGE_RATES: "true"
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "false"
      LOG_LEVEL: warn
    restart: unless-stopped

  blockscout-frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: vault-lab-blockscout-frontend
    depends_on:
      - blockscout
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_HOST: localhost
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_API_PORT: "4000"
      NEXT_PUBLIC_APP_HOST: localhost
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_APP_PORT: "3000"
      NEXT_PUBLIC_NETWORK_NAME: Vault Lab Local
      NEXT_PUBLIC_NETWORK_SHORT_NAME: VaultLab
      NEXT_PUBLIC_NETWORK_ID: "20001209"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: Ether
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ETH
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
    restart: unless-stopped

volumes:
  geth-data:
    name: vault-lab-geth-data
  blockscout-db-data:
    name: vault-lab-blockscout-db-data