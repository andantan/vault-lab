host: localhost:33152
info:
  contact: {}
  description: Ethereum transaction API
  title: evmlab API
  version: "1.0"
paths:
  /evm/abi/decode/call:
    post:
      consumes:
      - application/json
      description: Decodes calldata (4-byte selector + args) into a name→value map
        using the given function signature. Parameter names are used as keys; falls
        back to "arg0", "arg1", … when the signature has no names.
      parameters:
      - description: Function signature and hex-encoded calldata
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.DecodeCallRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.DecodeCallResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Decode ABI-encoded function calldata
      tags:
      - abi
  /evm/abi/decode/result:
    post:
      consumes:
      - application/json
      description: Decodes the raw hex output of an eth_call into human-readable values
        given a list of ABI types
      parameters:
      - description: ABI types and hex-encoded return data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.DecodeResultRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.DecodeResultResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Decode ABI-encoded return data
      tags:
      - abi
  /evm/abi/encode:
    post:
      consumes:
      - application/json
      description: |-
        Returns the ABI-encoded calldata (4-byte selector + packed arguments) for the given signature and args.
        Signature must be in canonical form — no spaces, no parameter names (e.g. "transfer(address,uint256)").
        Supported types: address | bool | string | bytes | bytes1–bytes32 | uint8/16/32/64/128/256 | int8/16/32/64/128/256
        Tuple, array, and slice types are not yet supported.
      parameters:
      - description: Function signature and arguments
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.EncodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.EncodeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ABI-encode a function call
      tags:
      - abi
  /evm/abi/encode/allowance:
    post:
      consumes:
      - application/json
      description: Returns ABI-encoded calldata for allowance(address,address)
      parameters:
      - description: Owner and spender addresses
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.AllowanceCalldataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.AllowanceCalldataResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Build allowance calldata
      tags:
      - abi
  /evm/abi/encode/approve:
    post:
      consumes:
      - application/json
      description: Returns ABI-encoded calldata for approve(address,uint256)
      parameters:
      - description: Spender address and amount
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.ApproveCalldataRequest'
      produces:
