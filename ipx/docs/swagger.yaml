basePath: /
definitions:
  misc.BalanceRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      block:
        example: latest
        type: string
    type: object
  misc.BalanceResponse:
    properties:
      balance:
        type: string
      balance_hex:
        type: string
      ether:
        type: string
      gwei:
        type: string
      wei:
        type: string
    type: object
  misc.BaseFeePerGasResponse:
    properties:
      base_fee_per_gas:
        type: string
      base_fee_per_gas_hex:
        type: string
      ether:
        type: string
      gwei:
        type: string
      wei:
        type: string
    type: object
  misc.BlockNumberResponse:
    properties:
      block_number:
        type: integer
      block_number_hex:
        type: string
    type: object
  misc.CallRequest:
    properties:
      block:
        example: latest
        type: string
      data:
        example: 0x70a08231...
        type: string
      from:
        example: 0xEbD69375...
        type: string
      to:
        example: 0x8336c196...
        type: string
    type: object
  misc.ChainIDResponse:
    properties:
      chain_id:
        type: integer
      chain_id_hex:
        type: string
    type: object
  misc.ChecksumEIP55Request:
    properties:
      address:
        example: 0xEbD69375...
        type: string
    type: object
  misc.ChecksumEIP55Response:
    properties:
      address:
        type: string
    type: object
  misc.CodeRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      block:
        example: latest
        type: string
    type: object
  misc.CodeResponse:
    properties:
      code:
        type: string
      is_contract:
        type: boolean
    type: object
  misc.DeriveKeyRequest:
    properties:
      private_key:
        example: 0xea66255f...
        type: string
    type: object
  misc.DeriveKeyResponse:
    properties:
      address:
        type: string
      private_key:
        type: string
      public_key:
        type: string
    type: object
  misc.EncodeRequest:
    properties:
      args:
        example:
        - '["0xDa70aA79..."'
        - '"1000000000000000000"]'
        items:
          type: string
        type: array
      signature:
        example: transfer(address,uint256)
        type: string
    type: object
  misc.EncodeResponse:
    properties:
      data:
        type: string
    type: object
  misc.EstimateGasRequest:
    properties:
      block:
        example: latest
        type: string
      data:
        example: 0x
        type: string
      from:
        example: 0xEbD69375...
        type: string
      to:
        example: 0x8336c196...
        type: string
      value:
        example: "1000000000000000000"
        type: string
    type: object
  misc.EstimateGasResponse:
    properties:
      ether:
        type: string
      gas_limit:
        type: integer
      gas_limit_hex:
        type: string
      gwei:
        type: string
      wei:
        type: string
    type: object
  misc.GasPriceResponse:
    properties:
      ether:
        type: string
      gas_price:
        type: string
      gas_price_hex:
        type: string
      gwei:
        type: string
      wei:
        type: string
    type: object
  misc.MaxFeePerGasResponse:
    properties:
      ether:
        type: string
      gwei:
        type: string
      max_fee_per_gas:
        type: string
      max_fee_per_gas_hex:
        type: string
      wei:
        type: string
    type: object
  misc.MaxPriorityFeePerGasResponse:
    properties:
      ether:
        type: string
      gwei:
        type: string
      max_priority_fee_per_gas:
        type: string
      max_priority_fee_per_gas_hex:
        type: string
      wei:
        type: string
    type: object
  misc.NonceRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      block:
        example: pending
        type: string
    type: object
  misc.NonceResponse:
    properties:
      nonce:
        type: integer
      nonce_hex:
        type: string
    type: object
  misc.SelectorRequest:
    properties:
      signature:
        example: transfer(address,uint256)
        type: string
    type: object
  misc.SelectorResponse:
    properties:
      selector:
        type: string
    type: object
  misc.SendTransactionRequest:
    properties:
      raw_tx:
        example: 0x02f8...
        type: string
    type: object
  misc.SendTransactionResponse:
    properties:
      tx_hash:
        type: string
    type: object
  misc.TransactionRequest:
    properties:
      tx_hash:
        example: 0xabc123...
        type: string
    type: object
  misc.UnitConvertDecimalRequest:
    properties:
      amount:
        example: "1"
        type: string
      from:
        example: ether
        type: string
      to:
        example: wei
        type: string
    type: object
  misc.UnitConvertDecimalResponse:
    properties:
      amount:
        type: string
      unit:
        type: string
    type: object
  v1.BuildDynamicFeeTransactionRequest:
    properties:
      chain_id:
        example: "20001209"
        type: string
      data:
        example: 0x
        type: string
      gas_limit:
        example: 21000
        type: integer
      max_fee_per_gas:
        example: "3000000000"
        type: string
      max_priority_fee_per_gas:
        example: "1500000000"
        type: string
      nonce:
        example: 0
        type: integer
      to:
        example: 0x8336c196ABb9E7092C879C28D352b39d3f2f3D7A
        type: string
      value:
        example: "1000000000000000000"
        type: string
    type: object
  v1.BuildDynamicFeeTransactionResponse:
    properties:
      signing_hash:
        type: string
      unsigned_rlp:
        type: string
    type: object
  v1.BuildLegacyTransactionRequest:
    properties:
      chain_id:
        example: "20001209"
        type: string
      data:
        example: 0x
        type: string
      gas_limit:
        example: 21000
        type: integer
      gas_price:
        example: "20000000000"
        type: string
      nonce:
        example: 0
        type: integer
      to:
        example: 0x8336c196ABb9E7092C879C28D352b39d3f2f3D7A
        type: string
      value:
        example: "1000000000000000000"
        type: string
    type: object
  v1.BuildLegacyTransactionResponse:
    properties:
      signing_hash:
        type: string
      unsigned_rlp:
        type: string
    type: object
  v1.Keccak256LegacyRequest:
    properties:
      message:
        example: hello world!
        type: string
    type: object
  v1.Keccak256LegacyResponse:
    properties:
      digest:
        type: string
    type: object
  v1.Keccak256PersonalRequest:
    properties:
      message:
        example: hello world!
        type: string
    type: object
  v1.Keccak256PersonalResponse:
    properties:
      digest:
        type: string
    type: object
  v1.SignDynamicFeeTransactionRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      unsigned_rlp:
        example: 0x02f8...
        type: string
    type: object
  v1.SignDynamicFeeTransactionResponse:
    properties:
      raw_transaction:
        type: string
      tx_hash:
        type: string
    type: object
  v1.SignLegacyTransactionRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      unsigned_rlp:
        example: 0xec8085...
        type: string
    type: object
  v1.SignLegacyTransactionResponse:
    properties:
      raw_transaction:
        type: string
      tx_hash:
        type: string
    type: object
  v1.SignRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      digest:
        example: 0xa1b2c3d4...
        type: string
    type: object
  v1.SignResponse:
    properties:
      signature:
        type: string
    type: object
  v1.VerifyByAddressRequest:
    properties:
      address:
        example: 0xAbCd1234...
        type: string
      hash:
        example: 0xa1b2c3d4...
        type: string
      signature:
        example: 0xa1b2c3d4...
        type: string
    type: object
  v1.VerifyByAddressResponse:
    properties:
      result:
        type: boolean
    type: object
  v1.VerifyByPublicKeyRequest:
    properties:
      hash:
        example: 0xa1b2c3d4...
        type: string
      public_key:
        example: 0x04a1b2c3...
        type: string
      signature:
        example: 0xa1b2c3d4...
        type: string
    type: object
  v1.VerifyByPublicKeyResponse:
    properties:
      result:
        type: boolean
    type: object
  v2.transferRequest:
    properties:
      from:
        description: sender address
        type: string
      to:
        type: string
      value:
        description: wei as decimal string
        type: string
    type: object
  v2.transferResponse:
    properties:
      tx_hash:
        type: string
    type: object
host: localhost:33152
info:
  contact: {}
  description: Ethereum transaction API
  title: evmlab API
  version: "1.0"
paths:
  /evm/abi/encode:
    post:
      consumes:
      - application/json
      description: |-
        Returns the ABI-encoded calldata (4-byte selector + packed arguments) for the given signature and args.
        Signature must be in canonical form — no spaces, no parameter names (e.g. "transfer(address,uint256)").
        Supported types: address | bool | string | bytes | bytes1–bytes32 | uint8/16/32/64/128/256 | int8/16/32/64/128/256
        Tuple, array, and slice types are not yet supported.
      parameters:
      - description: Function signature and arguments
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.EncodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.EncodeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ABI-encode a function call
      tags:
      - abi
  /evm/abi/selector:
    post:
      consumes:
      - application/json
      description: Returns the 4-byte selector for the given function signature
      parameters:
      - description: Function signature
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.SelectorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.SelectorResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Compute ABI function selector
      tags:
      - abi
  /evm/rpc/balance:
    post:
      consumes:
      - application/json
      description: Returns the balance for the given address at the specified block
        in decimal and hex
      parameters:
      - description: Address and block
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.BalanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.BalanceResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get balance for address
      tags:
      - rpc
  /evm/rpc/block-number:
    post:
      description: Returns the latest block number in decimal and hex
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.BlockNumberResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get block number
      tags:
      - rpc
  /evm/rpc/call:
    post:
      consumes:
      - application/json
      description: Executes eth_call and returns the raw result
      parameters:
      - description: Call parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.CallRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute a read-only contract call
      tags:
      - rpc
  /evm/rpc/chain-id:
    post:
      description: Returns the chain ID of the connected network as a decimal integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.ChainIDResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get chain ID
      tags:
      - rpc
  /evm/rpc/code:
    post:
      consumes:
      - application/json
      description: Returns the deployed code for the given address and whether it
        is a contract
      parameters:
      - description: Address and block
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.CodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.CodeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get code for address
      tags:
      - rpc
  /evm/rpc/fee/base:
    post:
      description: Returns the latest block baseFeePerGas in decimal and hex
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.BaseFeePerGasResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get base fee per gas
      tags:
      - rpc
  /evm/rpc/fee/max:
    post:
      description: Returns max_fee_per_gas calculated as base_fee_per_gas * 2 + max_priority_fee_per_gas
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.MaxFeePerGasResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get max fee per gas
      tags:
      - rpc
  /evm/rpc/fee/priority:
    post:
      description: Returns the recommended priority fee per gas in decimal and hex
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.MaxPriorityFeePerGasResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get max priority fee per gas
      tags:
      - rpc
  /evm/rpc/gas/estimate:
    post:
      consumes:
      - application/json
      description: Returns the estimated gas limit for the given transaction parameters
      parameters:
      - description: Transaction parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.EstimateGasRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.EstimateGasResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Estimate gas for a transaction
      tags:
      - rpc
  /evm/rpc/gas/price:
    post:
      description: Returns the current gas price in decimal and hex
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.GasPriceResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get gas price
      tags:
      - rpc
  /evm/rpc/nonce:
    post:
      consumes:
      - application/json
      description: Returns the pending transaction count (nonce) for the given address
        as a decimal integer
      parameters:
      - description: Address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.NonceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.NonceResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get nonce for address
      tags:
      - rpc
  /evm/rpc/transaction:
    post:
      consumes:
      - application/json
      description: Returns transaction details for the given tx hash
      parameters:
      - description: Transaction hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.TransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get transaction by hash
      tags:
      - rpc
  /evm/rpc/transaction/receipt:
    post:
      consumes:
      - application/json
      description: Returns the transaction receipt for the given tx hash
      parameters:
      - description: Transaction hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.TransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get transaction receipt by hash
      tags:
      - rpc
  /evm/rpc/transaction/send:
    post:
      consumes:
      - application/json
      description: Broadcasts a signed raw transaction with eth_sendRawTransaction
      parameters:
      - description: Signed raw transaction
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.SendTransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.SendTransactionResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send signed raw transaction
      tags:
      - rpc
  /evm/tool/address/checksum/eip55:
    post:
      consumes:
      - application/json
      description: Returns the EIP-55 mixed-case checksum encoding for the given address
      parameters:
      - description: Address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.ChecksumEIP55Request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.ChecksumEIP55Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Convert address to EIP-55 checksum format
      tags:
      - tool
  /evm/tool/crypto/derive:
    post:
      consumes:
      - application/json
      description: Returns the public key and address derived from the given private
        key
      parameters:
      - description: Private key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.DeriveKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.DeriveKeyResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Derive key set from private key
      tags:
      - tool
  /evm/tool/unit/convert/decimal:
    post:
      consumes:
      - application/json
      description: Converts a decimal amount from one Ethereum unit to another
      parameters:
      - description: Unit conversion
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/misc.UnitConvertDecimalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/misc.UnitConvertDecimalResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Convert amount between wei, gwei, and ether
      tags:
      - tool
  /evm/v1/hash/keccak256/legacy:
    post:
      consumes:
      - application/json
      description: Computes the Keccak256 hash of the given message with no prefix
        applied (no EIP standard)
      parameters:
      - description: Message to hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.Keccak256LegacyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Keccak256LegacyResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Compute raw Keccak256 hash
      tags:
      - hash
  /evm/v1/hash/keccak256/personal:
    post:
      consumes:
      - application/json
      description: Prepends the EIP-191 personal sign prefix ("\x19Ethereum Signed
        Message:\n" + length) to the message and returns the Keccak256 hash — matches
        the digest produced by eth_sign / personal_sign
      parameters:
      - description: Message to hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.Keccak256PersonalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Keccak256PersonalResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Compute Keccak256 hash with EIP-191 prefix
      tags:
      - hash
  /evm/v1/sign:
    post:
      consumes:
      - application/json
      description: Signs a hex-encoded 32-byte digest with the given private key using
        raw secp256k1 ECDSA. Hashing is the caller's responsibility — use the hash
        endpoints to produce the digest before calling this.
      parameters:
      - description: Address and digest
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.SignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.SignResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sign a pre-computed hash
      tags:
      - sign
  /evm/v1/sign/verify/by-address:
    post:
      consumes:
      - application/json
      description: Recovers the signer's address from the signature via ecrecover
        and compares it against the provided address
      parameters:
      - description: Hash, address, and signature
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.VerifyByAddressRequest'
      produces:
      - application/json
      responses:
        "200":
