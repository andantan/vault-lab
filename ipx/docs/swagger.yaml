basePath: /
definitions:
  v1.BalanceRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      block:
        example: latest
        type: string
    type: object
  v1.BalanceResponse:
    properties:
      balance:
        type: string
      balance_hex:
        type: string
      ether:
        type: string
      gwei:
        type: string
      wei:
        type: string
    type: object
  v1.BlockNumberResponse:
    properties:
      block_number:
        type: integer
      block_number_hex:
        type: string
    type: object
  v1.BuildLegacyNativeTransferRequest:
    properties:
      chain_id:
        example: "20001209"
        type: string
      data:
        example: 0x
        type: string
      gas_limit:
        example: 21000
        type: integer
      gas_price:
        example: "20000000000"
        type: string
      nonce:
        example: 0
        type: integer
      to:
        example: 0x8336c196ABb9E7092C879C28D352b39d3f2f3D7A
        type: string
      value:
        example: "1000000000000000000"
        type: string
    type: object
  v1.BuildLegacyNativeTransferResponse:
    properties:
      signing_hash:
        type: string
      unsigned_rlp:
        type: string
    type: object
  v1.CallRequest:
    properties:
      block:
        example: latest
        type: string
      data:
        example: 0x70a08231...
        type: string
      from:
        example: 0xEbD69375...
        type: string
      to:
        example: 0x8336c196...
        type: string
    type: object
  v1.ChainIDResponse:
    properties:
      chain_id:
        type: integer
      chain_id_hex:
        type: string
    type: object
  v1.ChecksumEIP55Request:
    properties:
      address:
        example: 0xEbD69375...
        type: string
    type: object
  v1.ChecksumEIP55Response:
    properties:
      address:
        type: string
    type: object
  v1.DeriveKeyRequest:
    properties:
      private_key:
        example: 0xea66255f...
        type: string
    type: object
  v1.DeriveKeyResponse:
    properties:
      address:
        type: string
      private_key:
        type: string
      public_key:
        type: string
    type: object
  v1.EstimateGasRequest:
    properties:
      block:
        example: latest
        type: string
      data:
        example: 0x
        type: string
      from:
        example: 0xEbD69375...
        type: string
      to:
        example: 0x8336c196...
        type: string
      value:
        example: "1000000000000000000"
        type: string
    type: object
  v1.EstimateGasResponse:
    properties:
      ether:
        type: string
      gas_limit:
        type: integer
      gas_limit_hex:
        type: string
      gwei:
        type: string
      wei:
        type: string
    type: object
  v1.GasPriceResponse:
    properties:
      ether:
        type: string
      gas_price:
        type: string
      gas_price_hex:
        type: string
      gwei:
        type: string
      wei:
        type: string
    type: object
  v1.Keccak256LegacyRequest:
    properties:
      message:
        example: hello world!
        type: string
    type: object
  v1.Keccak256LegacyResponse:
    properties:
      digest:
        type: string
    type: object
  v1.Keccak256PersonalRequest:
    properties:
      message:
        example: hello world!
        type: string
    type: object
  v1.Keccak256PersonalResponse:
    properties:
      digest:
        type: string
    type: object
  v1.NonceRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      block:
        example: pending
        type: string
    type: object
  v1.NonceResponse:
    properties:
      nonce:
        type: integer
      nonce_hex:
        type: string
    type: object
  v1.SignLegacyNativeTransferRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      unsigned_rlp:
        example: 0xec8085...
        type: string
    type: object
  v1.SignLegacyNativeTransferResponse:
    properties:
      raw_transaction:
        type: string
      tx_hash:
        type: string
    type: object
  v1.SignRequest:
    properties:
      address:
        example: 0xEbD69375...
        type: string
      digest:
        example: 0xa1b2c3d4...
        type: string
    type: object
  v1.SignResponse:
    properties:
      signature:
        type: string
    type: object
  v1.TransactionRequest:
    properties:
      tx_hash:
        example: 0xabc123...
        type: string
    type: object
  v1.VerifyByAddressRequest:
    properties:
      address:
        example: 0xAbCd1234...
        type: string
      hash:
        example: 0xa1b2c3d4...
        type: string
      signature:
        example: 0xa1b2c3d4...
        type: string
    type: object
  v1.VerifyByAddressResponse:
    properties:
      result:
        type: boolean
    type: object
  v1.VerifyByPublicKeyRequest:
    properties:
      hash:
        example: 0xa1b2c3d4...
        type: string
      public_key:
        example: 0x04a1b2c3...
        type: string
      signature:
        example: 0xa1b2c3d4...
        type: string
    type: object
  v1.VerifyByPublicKeyResponse:
    properties:
      result:
        type: boolean
    type: object
  v2.transferRequest:
    properties:
      from:
        description: sender address
        type: string
      to:
        type: string
      value:
        description: wei as decimal string
        type: string
    type: object
  v2.transferResponse:
    properties:
      tx_hash:
        type: string
    type: object
host: localhost:33152
info:
  contact: {}
  description: Ethereum transaction API
  title: evmlab API
  version: "1.0"
paths:
  /evm/rpc/balance:
    post:
      consumes:
      - application/json
      description: Returns the balance for the given address at the specified block
        in decimal and hex
      parameters:
      - description: Address and block
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.BalanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.BalanceResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get balance for address
      tags:
      - rpc
  /evm/rpc/block-number:
    post:
      description: Returns the latest block number in decimal and hex
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.BlockNumberResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get block number
      tags:
      - rpc
  /evm/rpc/call:
    post:
      consumes:
      - application/json
      description: Executes eth_call and returns the raw result
      parameters:
      - description: Call parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.CallRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute a read-only contract call
      tags:
      - rpc
  /evm/rpc/chain-id:
    post:
      description: Returns the chain ID of the connected network as a decimal integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.ChainIDResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get chain ID
      tags:
      - rpc
  /evm/rpc/estimate-gas:
    post:
      consumes:
      - application/json
      description: Returns the estimated gas limit for the given transaction parameters
      parameters:
      - description: Transaction parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.EstimateGasRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.EstimateGasResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Estimate gas for a transaction
      tags:
      - rpc
  /evm/rpc/gas-price:
    post:
      description: Returns the current gas price in decimal and hex
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.GasPriceResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get gas price
      tags:
      - rpc
  /evm/rpc/nonce:
    post:
      consumes:
      - application/json
      description: Returns the pending transaction count (nonce) for the given address
        as a decimal integer
      parameters:
      - description: Address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.NonceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.NonceResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get nonce for address
      tags:
      - rpc
  /evm/rpc/transaction:
    post:
      consumes:
      - application/json
      description: Returns transaction details for the given tx hash
      parameters:
      - description: Transaction hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.TransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get transaction by hash
      tags:
      - rpc
  /evm/rpc/transaction/receipt:
    post:
      consumes:
      - application/json
      description: Returns the transaction receipt for the given tx hash
      parameters:
      - description: Transaction hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.TransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get transaction receipt by hash
      tags:
      - rpc
  /evm/tool/address/checksum/eip55:
    post:
      consumes:
      - application/json
      description: Returns the EIP-55 mixed-case checksum encoding for the given address
      parameters:
      - description: Address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.ChecksumEIP55Request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.ChecksumEIP55Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Convert address to EIP-55 checksum format
      tags:
      - tool
  /evm/tool/crypto/derive:
    post:
      consumes:
      - application/json
      description: Returns the public key and address derived from the given private
        key
      parameters:
      - description: Private key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.DeriveKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.DeriveKeyResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Derive key set from private key
      tags:
      - tool
  /evm/v1/hash/keccak256/legacy:
    post:
      consumes:
      - application/json
      description: Computes the Keccak256 hash of the given message with no prefix
        applied (no EIP standard)
      parameters:
      - description: Message to hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.Keccak256LegacyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Keccak256LegacyResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Compute raw Keccak256 hash
      tags:
      - hash
  /evm/v1/hash/keccak256/personal:
    post:
      consumes:
      - application/json
      description: Prepends the EIP-191 personal sign prefix ("\x19Ethereum Signed
        Message:\n" + length) to the message and returns the Keccak256 hash — matches
        the digest produced by eth_sign / personal_sign
      parameters:
      - description: Message to hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.Keccak256PersonalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Keccak256PersonalResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Compute Keccak256 hash with EIP-191 prefix
      tags:
      - hash
  /evm/v1/sign:
    post:
      consumes:
      - application/json
      description: Signs a hex-encoded 32-byte digest with the given private key using
        raw secp256k1 ECDSA. Hashing is the caller's responsibility — use the hash
        endpoints to produce the digest before calling this.
      parameters:
      - description: Address and digest
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.SignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.SignResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sign a pre-computed hash
      tags:
      - sign
  /evm/v1/sign/verify/by-address:
    post:
      consumes:
      - application/json
      description: Recovers the signer's address from the signature via ecrecover
        and compares it against the provided address
      parameters:
      - description: Hash, address, and signature
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.VerifyByAddressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.VerifyByAddressResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify a signature against an address
      tags:
      - sign
  /evm/v1/sign/verify/by-public-key:
    post:
      consumes:
      - application/json
      description: Recovers the signer's public key from the signature via ecrecover
        and compares it against the provided public key
      parameters:
      - description: Hash, public key, and signature
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.VerifyByPublicKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.VerifyByPublicKeyResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify a signature against a public key
      tags:
      - sign
  /evm/v1/transaction/legacy/build:
    post:
      consumes:
      - application/json
      description: Constructs an unsigned EIP-155 legacy transaction for native ETH
        transfer and returns the RLP encoding and signing hash
      parameters:
      - description: Transaction fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.BuildLegacyNativeTransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.BuildLegacyNativeTransferResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Build an unsigned legacy native transfer transaction
      tags:
      - transaction
  /evm/v1/transaction/legacy/sign:
    post:
      consumes:
      - application/json
      description: Decodes an unsigned legacy RLP, signs it with the key for the given
        address, and returns the signed raw transaction and tx hash
      parameters:
      - description: Address and unsigned RLP
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1.SignLegacyNativeTransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.SignLegacyNativeTransferResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sign an unsigned legacy native transfer transaction
      tags:
      - transaction
  /evm/v2/transfers/native/eip1559:
    post:
      consumes:
      - application/json
      description: Signs and broadcasts a dynamic-fee ETH transfer transaction
      parameters:
      - description: Transfer request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v2.transferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v2.transferResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties:
              type: string
            type: object
        "504":
          description: Gateway Timeout
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send ETH (EIP-1559)
      tags:
      - transfer
swagger: "2.0"
